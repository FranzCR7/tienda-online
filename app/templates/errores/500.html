{% extends 'base.html' %}
{% block titulo %}Error del Servidor{% endblock %}
{% block contenido %}
<div class="container py-5 text-center">
    <div class="py-5">
        <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
        <h1 class="display-1 fw-bold text-muted">500</h1>
        <h3 class="mb-3">Error Interno del Servidor</h3>
        <p class="text-muted mb-4">Ocurrió un error inesperado. Por favor, intenta nuevamente más tarde.</p>
        <a href="{{ url_for('principal.index') }}" class="btn btn-primary btn-lg">
            <i class="bi bi-house me-2"></i>Volver al Inicio
        </a>
    </div>
</div>
{% endblock %}
